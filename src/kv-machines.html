<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="KellyVend" />
<title>KellyVend</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #ffffff; --bg2: #f2f2f7; --bg3: #e5e5ea;
  --text: #000000; --text2: #6c6c70; --text3: #aeaeb2;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --green: #1a9e6e; --green-bg: #e8f8f2;
  --red: #d0342c; --red-bg: #fdecea;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
    --text: #ffffff; --text2: #aeaeb2; --text3: #636366;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --green: #30d158; --green-bg: #1a2e22;
    --red: #ff453a; --red-bg: #2e1a1a;
  }
}
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; }
.tab-bar { display: flex; border-top: 0.5px solid var(--border); background: var(--bg); padding: 8px 0; padding-bottom: calc(8px + var(--safe-bottom)); flex-shrink: 0; }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; border: none; background: none; -webkit-user-select: none; }
.tab-icon { font-size: 22px; color: var(--text3); }
.tab-label { font-size: 10px; color: var(--text3); font-weight: 500; }
.tab.active .tab-icon, .tab.active .tab-label { color: var(--text); }
.screens { flex: 1; overflow: hidden; position: relative; }
.screen { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; flex-direction: column; padding-top: calc(16px + var(--safe-top)); }
.screen.active { display: flex; }
.subscreen { display: none; flex-direction: column; flex: 1; padding: 0 14px 16px; }
.subscreen.active { display: flex; }
.screen-header { display: flex; align-items: center; gap: 10px; padding: 0 14px 16px; flex-shrink: 0; }
.back-btn { background: none; border: none; font-size: 32px; color: var(--text); cursor: pointer; padding: 0; line-height: 1; display: flex; align-items: center; font-family: inherit; }
.screen-title { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; flex: 1; }
.list { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.list-item { background: var(--bg2); border-radius: 14px; padding: 18px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: none; width: 100%; text-align: left; font-family: inherit; }
.list-item:active { transform: scale(0.98); opacity: 0.8; }
.list-item-name { font-size: 18px; font-weight: 600; color: var(--text); }
.list-item-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
.list-chevron { font-size: 22px; color: var(--text3); }
.machine-grid { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.slot-row { display: flex; gap: 7px; flex: 1; }
.slot-btn { flex: 1; min-width: 0; padding: 16px 4px; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: 2px solid var(--border2); background: var(--bg2); transition: transform 0.1s; -webkit-user-select: none; font-family: inherit; }
.slot-btn:active { transform: scale(0.94); }
.slot-btn.filled { background: var(--text); border-color: var(--text); }
.slot-code { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; }
.slot-btn.filled .slot-code { color: var(--bg); }
.slot-name { font-size: 10px; font-weight: 500; color: var(--text2); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; padding: 0 3px; }
.slot-btn.filled .slot-name { color: rgba(255,255,255,0.6); }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 300; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-width: 430px; padding: 24px 20px; padding-bottom: calc(32px + var(--safe-bottom)); }
.modal-slot-code { font-size: 40px; font-weight: 700; text-align: center; color: var(--text); margin-bottom: 20px; letter-spacing: -1px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.field input { width: 100%; padding: 14px; border: 2px solid var(--border2); border-radius: 12px; font-size: 20px; font-weight: 500; background: var(--bg); color: var(--text); font-family: inherit; appearance: none; -webkit-appearance: none; }
.field input:focus { outline: none; border-color: var(--text); }
.counts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.count-card { background: var(--bg2); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.count-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
.count-input { width: 100%; background: none; border: none; font-size: 44px; font-weight: 700; color: var(--text); text-align: center; font-family: inherit; padding: 0; }
.count-input:focus { outline: none; }
.sold-line { text-align: center; font-size: 14px; color: var(--text2); margin-bottom: 18px; min-height: 20px; }
.sold-line strong { font-weight: 700; color: var(--text); }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-cancel { padding: 16px; background: var(--bg2); border: none; border-radius: 14px; font-size: 17px; font-weight: 600; color: var(--text2); cursor: pointer; font-family: inherit; }
.btn-save { padding: 16px; background: var(--text); border: none; border-radius: 14px; font-size: 17px; font-weight: 600; color: var(--bg); cursor: pointer; font-family: inherit; }
.btn-save:active { opacity: 0.75; } .btn-cancel:active { opacity: 0.6; }
.perf-highlights { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.highlight-card { border-radius: 14px; padding: 14px; }
.highlight-card.top { background: var(--green-bg); }
.highlight-card.bottom { background: var(--red-bg); }
.highlight-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.highlight-card.top .highlight-badge { color: var(--green); }
.highlight-card.bottom .highlight-badge { color: var(--red); }
.highlight-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.highlight-stat { font-size: 13px; color: var(--text2); }
.perf-section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.product-list { display: flex; flex-direction: column; gap: 8px; }
.product-item { background: var(--bg2); border-radius: 14px; padding: 16px; cursor: pointer; border: none; width: 100%; text-align: left; font-family: inherit; display: flex; justify-content: space-between; align-items: center; }
.product-item:active { opacity: 0.7; }
.product-item-name { font-size: 17px; font-weight: 600; color: var(--text); }
.product-item-meta { font-size: 13px; color: var(--text2); margin-top: 2px; }
.product-item-sold { font-size: 20px; font-weight: 700; color: var(--text); }
.product-detail { padding: 0; flex: 1; overflow-y: auto; }
.detail-section { margin-bottom: 24px; }
.detail-section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.compare-bar-row { margin-bottom: 12px; }
.compare-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
.compare-bar-name { font-size: 14px; font-weight: 500; color: var(--text); }
.compare-bar-val { font-size: 14px; font-weight: 600; color: var(--text); }
.bar-track { background: var(--bg3); border-radius: 6px; height: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 6px; background: var(--text3); }
.bar-fill.highlight { background: var(--green); }
.empty-state { text-align: center; color: var(--text3); font-size: 15px; padding: 48px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="screens">

    <!-- INVENTORY TAB -->
    <div class="screen active" id="screen-inventory">
      <div class="subscreen active" id="sub-locations">
        <div class="screen-header"><div class="screen-title">Locations</div></div>
        <div class="list" id="locations-list"></div>
      </div>
      <div class="subscreen" id="sub-machines">
        <div class="screen-header">
          <button class="back-btn" onclick="goBack('sub-machines','sub-locations')">‹</button>
          <div class="screen-title" id="machines-title">Machines</div>
        </div>
        <div class="list" id="machines-list"></div>
      </div>
      <div class="subscreen" id="sub-grid">
        <div class="screen-header">
          <button class="back-btn" onclick="goBack('sub-grid','sub-machines')">‹</button>
          <div class="screen-title" id="grid-title">Machine</div>
        </div>
        <div class="machine-grid" id="machine-grid"></div>
      </div>
    </div>

    <!-- PERFORMANCE TAB -->
    <div class="screen" id="screen-performance">
      <div class="subscreen active" id="sub-perf-list">
        <div class="screen-header"><div class="screen-title">Performance</div></div>
        <div id="perf-highlights" class="perf-highlights"></div>
        <div class="perf-section-title">All Products</div>
        <div class="product-list" id="product-list"></div>
      </div>
      <div class="subscreen" id="sub-perf-detail">
        <div class="screen-header">
          <button class="back-btn" onclick="goBack('sub-perf-detail','sub-perf-list')">‹</button>
          <div class="screen-title" id="detail-title">Product</div>
        </div>
        <div class="product-detail" id="product-detail"></div>
      </div>
    </div>

  </div>
  <nav class="tab-bar">
    <button class="tab active" id="tab-inventory" onclick="switchTab('inventory')">
      <div class="tab-icon">⊞</div><div class="tab-label">Inventory</div>
    </button>
    <button class="tab" id="tab-performance" onclick="switchTab('performance')">
      <div class="tab-icon">◎</div><div class="tab-label">Performance</div>
    </button>
  </nav>
</div>

<!-- SLOT MODAL -->
<div class="overlay" id="slot-overlay" onclick="overlayBgClose(event)">
  <div class="modal">
    <div class="modal-slot-code" id="modal-slot-code">A3</div>
    <div class="field">
      <label>Product Name</label>
      <input type="text" id="f-name" placeholder="e.g. Doritos Nacho" autocomplete="off" autocorrect="off" />
    </div>
    <div class="field">
      <label>Sale Price $</label>
      <input type="number" id="f-price" min="0" step="0.25" placeholder="0.00" inputmode="decimal" />
    </div>
    <div class="counts-row">
      <div class="count-card">
        <div class="count-label">Before</div>
        <input class="count-input" type="number" id="f-before" min="0" placeholder="0" inputmode="numeric" oninput="updateSoldLine()" />
      </div>
      <div class="count-card">
        <div class="count-label">After</div>
        <input class="count-input" type="number" id="f-after" min="0" placeholder="0" inputmode="numeric" oninput="updateSoldLine()" />
      </div>
    </div>
    <div class="sold-line" id="sold-line"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeSlotModal()">Cancel</button>
      <button class="btn-save" onclick="saveSlot()">Save</button>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  locations: [
    {
      id: 'loc1', name: 'Location 1',
      machines: [
        {
          id: 'machine1', name: 'Machine 1',
          layout: [
            { row:'A', slots:[1,3,5] },
            { row:'B', slots:[1,3,4,6] },
            { row:'C', slots:[1,2,3,4,5,6] },
            { row:'D', slots:[1,2,3,4,5,6] },
            { row:'E', slots:[1,3,4,6] },
          ]
        }
      ]
    }
  ]
};

let slotData = {}, visits = [];
let currentLocation = null, currentMachine = null, currentSlotKey = null, currentSlotCode = null;

function sdKey(locId, machId, slot) { return locId+'__'+machId+'__'+slot; }
function loadData() {
  try { const s = localStorage.getItem('kv2-slots'); if(s) slotData=JSON.parse(s); } catch(e){}
  try { const v = localStorage.getItem('kv2-visits'); if(v) visits=JSON.parse(v); } catch(e){}
}
function persist() {
  try { localStorage.setItem('kv2-slots', JSON.stringify(slotData)); } catch(e){}
  try { localStorage.setItem('kv2-visits', JSON.stringify(visits)); } catch(e){}
}

function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='performance') renderPerformance();
}

function goBack(fromId, toId) {
  document.getElementById(fromId).classList.remove('active');
  document.getElementById(toId).classList.add('active');
}

function showSub(screenId, subId) {
  document.getElementById(screenId).querySelectorAll('.subscreen').forEach(s=>s.classList.remove('active'));
  document.getElementById(subId).classList.add('active');
}

// LOCATIONS
function renderLocations() {
  const el = document.getElementById('locations-list');
  el.innerHTML = '';
  CONFIG.locations.forEach(loc => {
    const btn = document.createElement('button');
    btn.className = 'list-item';
    btn.innerHTML = `<div><div class="list-item-name">${loc.name}</div><div class="list-item-sub">${loc.machines.length} machine${loc.machines.length!==1?'s':''}</div></div><div class="list-chevron">›</div>`;
    btn.onclick = () => selectLocation(loc);
    el.appendChild(btn);
  });
}

function selectLocation(loc) {
  currentLocation = loc;
  document.getElementById('machines-title').textContent = loc.name;
  const el = document.getElementById('machines-list');
  el.innerHTML = '';
  loc.machines.forEach(machine => {
    const btn = document.createElement('button');
    btn.className = 'list-item';
    const slotCount = machine.layout.reduce((s,r)=>s+r.slots.length,0);
    btn.innerHTML = `<div><div class="list-item-name">${machine.name}</div><div class="list-item-sub">${slotCount} slots</div></div><div class="list-chevron">›</div>`;
    btn.onclick = () => selectMachine(machine);
    el.appendChild(btn);
  });
  showSub('screen-inventory','sub-machines');
}

function selectMachine(machine) {
  currentMachine = machine;
  document.getElementById('grid-title').textContent = machine.name;
  renderGrid(machine);
  showSub('screen-inventory','sub-grid');
}

function renderGrid(machine) {
  const el = document.getElementById('machine-grid');
  el.innerHTML = '';
  machine.layout.forEach(({row,slots}) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'slot-row';
    slots.forEach(slot => {
      const code = row+slot;
      const key = sdKey(currentLocation.id, machine.id, code);
      const d = slotData[key] || {};
      const btn = document.createElement('button');
      btn.className = 'slot-btn'+(d.name?' filled':'');
      btn.innerHTML = `<span class="slot-code">${code}</span>${d.name?`<span class="slot-name">${d.name}</span>`:''}`;
      btn.onclick = () => openSlotModal(code, key, d);
      rowDiv.appendChild(btn);
    });
    el.appendChild(rowDiv);
  });
}

// SLOT MODAL
function openSlotModal(code, key, d) {
  currentSlotKey = key;
  currentSlotCode = code;
  document.getElementById('modal-slot-code').textContent = code;
  document.getElementById('f-name').value = d.name||'';
  document.getElementById('f-price').value = d.price!=null?d.price:'';
  document.getElementById('f-before').value = d.before!=null?d.before:'';
  document.getElementById('f-after').value = d.after!=null?d.after:'';
  updateSoldLine();
  document.getElementById('slot-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),150);
}

function updateSoldLine() {
  const before = parseFloat(document.getElementById('f-before').value);
  const after = parseFloat(document.getElementById('f-after').value);
  const el = document.getElementById('sold-line');
  if(!isNaN(before)&&!isNaN(after)) {
    const sold = Math.max(0, before-after);
    const prev = visits.filter(v=>v.slotKey===currentSlotKey);
    const lastSold = prev.length ? prev[prev.length-1].sold : null;
    let txt = `<strong>${sold}</strong> sold this visit`;
    if(lastSold!==null) txt += ` &nbsp;·&nbsp; <strong>${lastSold}</strong> last visit`;
    el.innerHTML = txt;
  } else { el.innerHTML = ''; }
}

function closeSlotModal() { document.getElementById('slot-overlay').classList.remove('open'); }
function overlayBgClose(e) { if(e.target===document.getElementById('slot-overlay')) closeSlotModal(); }

function saveSlot() {
  const name = document.getElementById('f-name').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const before = parseFloat(document.getElementById('f-before').value);
  const after = parseFloat(document.getElementById('f-after').value);
  const sold = (!isNaN(before)&&!isNaN(after)) ? Math.max(0,before-after) : null;
  slotData[currentSlotKey] = { name, price:isNaN(price)?null:price, before:isNaN(before)?null:before, after:isNaN(after)?null:after };
  if(name && sold!==null) {
    visits.push({
      slotKey:currentSlotKey, locationId:currentLocation.id, machineId:currentMachine.id,
      locationName:currentLocation.name, machineName:currentMachine.name,
      slot:currentSlotCode, name, price:isNaN(price)?null:price, sold,
      revenue:(!isNaN(price)&&sold>0)?sold*price:0, ts:Date.now()
    });
  }
  persist();
  renderGrid(currentMachine);
  closeSlotModal();
}

// PERFORMANCE
function getAllProducts() {
  const map = {};
  visits.forEach(v => {
    if(!v.name) return;
    const k = v.name.trim().toLowerCase();
    if(!map[k]) map[k]={name:v.name,totalSold:0,totalRevenue:0,machines:{}};
    map[k].totalSold += v.sold;
    map[k].totalRevenue += v.revenue||0;
    const mk = v.locationName+' › '+v.machineName;
    if(!map[k].machines[mk]) map[k].machines[mk]={sold:0,revenue:0};
    map[k].machines[mk].sold += v.sold;
    map[k].machines[mk].revenue += v.revenue||0;
  });
  return Object.values(map).sort((a,b)=>b.totalSold-a.totalSold);
}

function renderPerformance() {
  const products = getAllProducts();
  const hEl = document.getElementById('perf-highlights');
  if(products.length>=2) {
    const top=products[0], bot=products[products.length-1];
    hEl.innerHTML = `
      <div class="highlight-card top"><div class="highlight-badge">🏆 Top</div><div class="highlight-name">${top.name}</div><div class="highlight-stat">${top.totalSold} sold · $${top.totalRevenue.toFixed(2)}</div></div>
      <div class="highlight-card bottom"><div class="highlight-badge">⚠️ Lowest</div><div class="highlight-name">${bot.name}</div><div class="highlight-stat">${bot.totalSold} sold · $${bot.totalRevenue.toFixed(2)}</div></div>`;
  } else { hEl.innerHTML=''; }

  const pEl = document.getElementById('product-list');
  if(!products.length) { pEl.innerHTML='<div class="empty-state">Log some visits to see performance.</div>'; return; }
  pEl.innerHTML='';
  products.forEach(p => {
    const btn = document.createElement('button');
    btn.className='product-item';
    btn.innerHTML=`<div><div class="product-item-name">${p.name}</div><div class="product-item-meta">$${p.totalRevenue.toFixed(2)} revenue · ${Object.keys(p.machines).length} machine${Object.keys(p.machines).length!==1?'s':''}</div></div><div class="product-item-sold">${p.totalSold}</div>`;
    btn.onclick=()=>showProductDetail(p,products);
    pEl.appendChild(btn);
  });
}

function showProductDetail(product, allProducts) {
  document.getElementById('detail-title').textContent = product.name;
  const el = document.getElementById('product-detail');
  const maxGlobal = Math.max(...allProducts.map(p=>p.totalSold),1);
  const machineEntries = Object.entries(product.machines).sort((a,b)=>b[1].sold-a[1].sold);
  const maxMachine = Math.max(...machineEntries.map(e=>e[1].sold),1);

  let html = '';

  // By machine
  html += `<div class="detail-section"><div class="detail-section-title">This Product — By Machine</div>`;
  machineEntries.forEach(([mName,data])=>{
    const pct=Math.round((data.sold/maxMachine)*100);
    html+=`<div class="compare-bar-row"><div class="compare-bar-label"><span class="compare-bar-name">${mName}</span><span class="compare-bar-val">${data.sold} sold</span></div><div class="bar-track"><div class="bar-fill highlight" style="width:${pct}%"></div></div></div>`;
  });
  html += `</div>`;

  // vs All products globally
  html += `<div class="detail-section"><div class="detail-section-title">vs All Products (Global)</div>`;
  allProducts.forEach(p=>{
    const pct=Math.round((p.totalSold/maxGlobal)*100);
    const isThis=p.name.toLowerCase()===product.name.toLowerCase();
    html+=`<div class="compare-bar-row"><div class="compare-bar-label"><span class="compare-bar-name" style="${isThis?'font-weight:700':''}">${p.name}${isThis?' ●':''}</span><span class="compare-bar-val">${p.totalSold}</span></div><div class="bar-track"><div class="bar-fill${isThis?' highlight':''}" style="width:${pct}%"></div></div></div>`;
  });
  html += `</div>`;

  el.innerHTML = html;
  showSub('screen-performance','sub-perf-detail');
}

loadData();
renderLocations();
</script>
</body>
</html>
